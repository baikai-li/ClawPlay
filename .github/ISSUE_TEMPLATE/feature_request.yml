name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        Have an idea for ClawPlay? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem or Limitation
      description: What problem does this solve? Why is it needed?
      placeholder: |
        Currently, it's difficult to ...
        I want to be able to ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
      placeholder: |
        Add a new command `clawplay xxx` that ...
        Support ... via the relay API
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, related issues, implementation hints
    validations:
      required: false
