name: Deploy to Hong Kong (Overseas)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DEPLOY_REGION: HK
      DEPLOY_PATH: /var/www/clawplay

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hong Kong server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST_HK }}
          username: ${{ secrets.DEPLOY_USER_HK }}
          key: ${{ secrets.DEPLOY_KEY_HK }}
          timeout: 10m
          envs: DEPLOY_REGION,DEPLOY_PATH
          script: |
            cd $DEPLOY_PATH
            git fetch origin
            git checkout ${{ secrets.DEPLOY_BRANCH_HK }}
            git pull origin ${{ secrets.DEPLOY_BRANCH_HK }}
            cd web
            npm ci --prefer-offline
            npm run db:migrate
            npm run build
            pm2 startOrRestart /var/www/clawplay/ecosystem.config.cjs --env production
            pm2 save
