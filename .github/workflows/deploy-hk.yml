name: Deploy to Hong Kong (Overseas)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DEPLOY_REGION: HK
      DEPLOY_PATH: /var/www/clawplay

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Hong Kong server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST_HK }}
          username: ${{ secrets.DEPLOY_USER_HK }}
          key: ${{ secrets.DEPLOY_KEY_HK }}
          timeout: 10m
          envs: DEPLOY_REGION,DEPLOY_PATH
          script: |
            set -e
            cd $DEPLOY_PATH
            git fetch origin
            git checkout ${{ secrets.DEPLOY_BRANCH_HK }}
            git pull origin ${{ secrets.DEPLOY_BRANCH_HK }}
            cd web
            npm ci --prefer-offline || npm install
            set -a && source .env.production && set +a
            npm run db:migrate

            # Backup current build before rebuilding
            BACKUP_DIR=".next-backup-$(date +%s)"
            if [ -d .next ]; then mv .next "$BACKUP_DIR"; fi

            # Build — if this fails, script exits here (set -e), backup still intact
            npm run build

            # Build succeeded: remove old backup, restart
            rm -rf "$BACKUP_DIR"
            pm2 restart /var/www/clawplay/ecosystem.config.cjs --env production
            pm2 save
